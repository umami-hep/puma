name: Docs Preview Cleanup

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR docs preview
        run: |
          preview_dir="pr-${{ github.event.pull_request.number }}"
          if [ ! -d "$preview_dir" ]; then
            echo "No docs preview found for $preview_dir"
            exit 0
          fi
          rm -rf "$preview_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$preview_dir"
          git commit -m "Remove docs preview for PR #${{ github.event.pull_request.number }}"
          git push
