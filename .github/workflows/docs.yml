name: Docs
concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/tags/') && github.sha || (github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Set docs cache key
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - name: Cache docs environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/docs
          key: zensical-${{ env.cache_id }}
          restore-keys: |
            zensical-

      - name: Install dependencies
        run: uv sync --extra dev && uv pip install -r docs/requirements.txt

      - name: Build Docs
        run: zensical build --config-file zensical.yml --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Deploy PR docs preview
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          target-folder: pr-${{ github.event.pull_request.number }}

      - name: Deploy Docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: site
          clean-exclude: |
            pr-*
