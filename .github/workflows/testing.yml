name: Test and publish
concurrency:
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/tags/') && github.sha || (github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
    tags:
      - "*"
  workflow_dispatch:

jobs:
  unit_tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Tkinter
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Run tests
        run: pytest -v --junitxml=coverage.xml --cov-report=term-missing:skip-covered --cov=puma puma/tests/

      - name: Report coverage with Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  example_tests:
    name: Example tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install Tkinter and rsync
        run: sudo apt-get update && sudo apt-get install -y python3-tk && sudo apt-get install -y rsync

      - name: Run tests
        run: mkdir plots && cd plots && for f in ../examples/*.py; do python "$f"; done

      # This action will only update the examples-material branch if it
      # is affected by the changes that triggered the job
      - name: Upload examples-material
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.14'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          BRANCH: examples-material
          FOLDER: plots

  publish:
    name: Publish to PyPI
    needs: [unit_tests, example_tests]
    runs-on: ubuntu-latest
    # Only run for a tagged commit
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    permissions:
      id-token: write # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync environment
        run: uv sync

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI }}
